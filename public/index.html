<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPPG Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'DM Sans', sans-serif; }
  .role-btn { flex:1; padding:10px; border-radius:8px; border:1px solid #e5e7eb; font-size:.875rem; color:#6b7280; cursor:pointer; transition:all .15s; background:white; }
  .role-btn:hover { border-color:#f97316; color:#f97316; }
  .role-btn.selected { background:#f97316; color:white; border-color:#f97316; }
  .field { width:100%; padding:11px 14px; border:1px solid #e5e7eb; border-radius:8px; font-size:.875rem; color:#111827; transition:border-color .15s,box-shadow .15s; outline:none; }
  .field:focus { border-color:#f97316; box-shadow:0 0 0 3px rgba(249,115,22,.12); }
  .field::placeholder { color:#9ca3af; }
  .modal-box { animation:slideUp .2s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .hero-content { animation:fadeIn .6s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body class="bg-gray-950 overflow-x-hidden">

<div class="fixed inset-0 z-0">
  <img src="images/HOUSE.jpg" class="w-full h-full object-cover opacity-30" onerror="this.style.display='none'">
  <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/80"></div>
</div>

<nav class="relative z-20 px-6 py-4">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-orange-500 overflow-hidden flex items-center justify-center border border-white/20">
        <img src="images/TPPG.jpg" class="w-full h-full object-cover" onerror="this.style.display='none'">
      </div>
      <span class="text-white font-semibold text-lg">TPPG Portal</span>
    </div>
    <div class="flex gap-2">
      <button onclick="openLogin()" class="px-4 py-2 border border-white/25 text-white text-sm rounded-lg hover:bg-white/10 transition-colors">Log In</button>
      <button onclick="openRegister()" class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white text-sm rounded-lg transition-colors font-medium">Register</button>
    </div>
  </div>
</nav>

<!-- LOGIN MODAL -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/65 z-50 flex items-center justify-center p-4">
  <div class="modal-box bg-white rounded-2xl w-full max-w-sm p-7 relative shadow-2xl">
    <button onclick="closeLogin()" class="absolute top-4 right-5 text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    <h2 class="text-xl font-bold text-gray-900 mb-1">Welcome back</h2>
    <p class="text-gray-400 text-xs mb-5">Select your role to continue</p>
    <div class="flex gap-2 mb-5">
      <button onclick="selectRole('admin')" id="roleAdmin" class="role-btn">Admin</button>
      <button onclick="selectRole('agent')" id="roleAgent" class="role-btn">Agent</button>
    </div>
    <div id="loginFields" class="hidden space-y-3">
      <input id="loginId"  type="text"     placeholder="Admin ID / Agent ID" class="field">
      <input id="email"    type="email"    placeholder="Email address"        class="field">
      <input id="password" type="password" placeholder="Password"             class="field">
      <button onclick="handleLogin()" class="w-full bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white py-3 rounded-lg font-semibold transition-colors">Log In</button>
      <p id="loginError" class="text-red-500 text-xs text-center hidden"></p>
    </div>
    <p class="text-xs text-center text-gray-400 mt-4">
      No account yet? <button onclick="closeLogin();openRegister();" class="text-orange-500 font-medium hover:underline">Register</button>
    </p>
  </div>
</div>

<!-- REGISTER MODAL -->
<div id="registerModal" class="hidden fixed inset-0 bg-black/65 z-50 flex items-center justify-center p-4">
  <div class="modal-box bg-white rounded-2xl w-full max-w-sm p-7 relative shadow-2xl max-h-[92vh] overflow-y-auto">
    <button onclick="closeRegister()" class="absolute top-4 right-5 text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    <h2 class="text-xl font-bold text-gray-900 mb-1">Agent Application</h2>
    <p class="text-xs text-gray-400 mb-5">Your application will be reviewed by the administrator.</p>
    <div class="space-y-3">
      <input id="regName"     type="text"     placeholder="Full Name"       class="field">
      <input id="regEmail"    type="email"    placeholder="Email Address"   class="field">
      <input id="regNumber"   type="text"     placeholder="Contact Number"  class="field">
      <input id="regPassword" type="password" placeholder="Password"        class="field">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Valid ID — Front</label>
        <input id="idFront" type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-orange-50 file:text-orange-600 file:text-xs file:font-medium hover:file:bg-orange-100 border border-gray-200 rounded-lg p-1">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Valid ID — Back</label>
        <input id="idBack" type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-orange-50 file:text-orange-600 file:text-xs file:font-medium hover:file:bg-orange-100 border border-gray-200 rounded-lg p-1">
      </div>
      <button onclick="handleRegister()" class="w-full bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white py-3 rounded-lg font-semibold transition-colors">Submit Application</button>
      <p class="text-xs text-center text-gray-400">Already have an account? <button onclick="closeRegister();openLogin();" class="text-orange-500 font-medium hover:underline">Log In</button></p>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

let selectedRole = '';

window.openLogin     = () => document.getElementById('loginModal').classList.remove('hidden');
window.closeLogin    = () => { document.getElementById('loginModal').classList.add('hidden'); resetLogin(); };
window.openRegister  = () => document.getElementById('registerModal').classList.remove('hidden');
window.closeRegister = () => document.getElementById('registerModal').classList.add('hidden');

function resetLogin() {
  selectedRole = '';
  document.getElementById('loginFields').classList.add('hidden');
  document.getElementById('loginError').classList.add('hidden');
  document.getElementById('roleAdmin').classList.remove('selected');
  document.getElementById('roleAgent').classList.remove('selected');
  ['loginId','email','password'].forEach(id => document.getElementById(id).value = '');
}

window.selectRole = (role) => {
  selectedRole = role;
  document.getElementById('loginFields').classList.remove('hidden');
  document.getElementById('loginError').classList.add('hidden');
  document.getElementById('roleAdmin').classList.remove('selected');
  document.getElementById('roleAgent').classList.remove('selected');
  document.getElementById('role' + role[0].toUpperCase() + role.slice(1)).classList.add('selected');
  document.getElementById('loginId').placeholder = role === 'admin' ? 'Admin ID (ADMIN-001)' : 'Agent ID (e.g. AGT-00142)';
};

window.handleLogin = async () => {
  const loginId  = document.getElementById('loginId').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!selectedRole) return;
  if (!loginId || !email || !password) return showError('Please fill in all fields.');

  try {
    const res  = await fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ loginId, email, password, role: selectedRole }),
    });

    const data = await res.json();

    if (!res.ok) return showError(data.message || 'Login failed.');

    // Save token and user info
    localStorage.setItem('token', data.token);
    localStorage.setItem('role',  data.role);
    localStorage.setItem('name',  data.name);
    localStorage.setItem('email', data.email);

    if (data.role === 'admin') {
      localStorage.setItem('adminId', data.adminId);
      window.location.href = 'admin-dashboard.html';
    } else {
      localStorage.setItem('agentId',    data.agentId);
      localStorage.setItem('agentPhone', data.phone || '');
      window.location.href = 'agent-dashboard.html';
    }

  } catch (err) {
    showError('Server error. Please try again.');
  }
};

window.handleRegister = async () => {
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const number   = document.getElementById('regNumber').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const idFront  = document.getElementById('idFront').files[0];
  const idBack   = document.getElementById('idBack').files[0];

  if (!name || !email || !number || !password || !idFront || !idBack) {
    alert('Please complete all fields including ID uploads.'); return;
  }

  try {
    const formData = new FormData();
    formData.append('name',     name);
    formData.append('email',    email);
    formData.append('phone',    number);
    formData.append('password', password);
    formData.append('idFront',  idFront);
    formData.append('idBack',   idBack);

    const res  = await fetch('/api/auth/register', {
      method: 'POST',
      body:   formData,
    });

    const data = await res.json();

    if (!res.ok) return alert(data.message || 'Registration failed.');

    alert('Application submitted!\n\nYour Agent ID is: ' + data.agentId + '\n\nSave this ID — you will need it to log in once approved.');
    closeRegister();
    ['regName','regEmail','regNumber','regPassword'].forEach(id => document.getElementById(id).value = '');

  } catch (err) {
    alert('Server error. Please try again.');
  }
};

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

document.getElementById('loginModal').addEventListener('click', e => { if (e.target.id === 'loginModal') closeLogin(); });
document.getElementById('registerModal').addEventListener('click', e => { if (e.target.id === 'registerModal') closeRegister(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLogin(); closeRegister(); } });

}); // end DOMContentLoaded
</script>
</body>
</html>
