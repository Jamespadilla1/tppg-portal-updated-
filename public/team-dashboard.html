<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Dashboard - TPPG</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          white: '#1f2937',
          gray: { 900:'#ffffff', 950:'#f7f6f4' },
        }
      }
    }
  }
</script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family:'DM Sans',sans-serif; }
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
  .nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#6b7280;font-size:.875rem;cursor:pointer;transition:all .15s;user-select:none}
  .nav-link:hover{background:rgba(0,0,0,.045);color:#111827}
  .nav-link.active{background:rgba(249,115,22,.1);color:#ea580c}
  .nav-link .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
  .nav-link.active .dot{opacity:1;background:#ea580c}
  .card{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px}
  .card:hover{border-color:#ea580c66}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:500}
  .badge-green{background:rgba(34,197,94,.1);color:#16a34a}
  .badge-yellow{background:rgba(234,179,8,.1);color:#ca8a04}
  .badge-red{background:rgba(239,68,68,.1);color:#dc2626}
  .badge-blue{background:rgba(59,130,246,.1);color:#2563eb}
  @media(max-width:768px){
    #sidebar{position:fixed;transform:translateX(-100%);z-index:40;transition:transform .25s}
    #sidebar.open{transform:translateX(0)}
    #main{margin-left:0!important}
  }
</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-gray-900 border-r border-white/8 flex flex-col">
  <div class="px-5 py-5 border-b border-white/8 flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-orange-500 flex items-center justify-center text-sm font-bold">T</div>
    <span class="font-semibold text-white" id="sidebarRoleLabel">TPPG</span>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-0.5">
    <div class="nav-link active"><span class="dot"></span> My Team</div>
  </nav>
  <div class="mx-3 mb-3 px-3 py-2 rounded-lg bg-yellow-500/8 border border-yellow-500/20 text-yellow-400 text-xs">👁 View-only access</div>
  <div class="px-5 py-4 border-t border-white/8">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-orange-500/20 text-orange-400 flex items-center justify-center text-xs font-bold" id="sidebarInitials">--</div>
      <div>
        <p class="text-sm font-medium text-white" id="sidebarName">—</p>
        <p class="text-xs text-gray-500" id="sidebarRole2">—</p>
      </div>
    </div>
    <button onclick="logout()" class="mt-3 w-full text-xs text-gray-500 hover:text-red-400 text-left transition-colors">← Log out</button>
  </div>
</aside>

<div id="main" class="ml-60 min-h-screen flex flex-col">
  <header class="sticky top-0 z-30 bg-gray-950/90 backdrop-blur border-b border-white/8 px-8 py-4 flex items-center justify-between">
    <h1 class="font-bold text-lg" id="pageTitle">My Team</h1>
    <p class="text-xs text-gray-500" id="teamSummary"></p>
  </header>

  <main class="flex-1 p-6 space-y-6">

    <!-- Unit Manager only: Sales Managers -->
    <div id="smSection" class="hidden space-y-3">
      <h2 class="font-semibold text-sm text-gray-500 uppercase tracking-wide">Sales Managers</h2>
      <div id="smGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <!-- Unit Manager + Sales Manager: Team Leaders -->
    <div id="tlSection" class="hidden space-y-3">
      <h2 class="font-semibold text-sm text-gray-500 uppercase tracking-wide">Team Leaders</h2>
      <div id="tlGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <!-- Everyone: Agents -->
    <div class="space-y-3">
      <h2 class="font-semibold text-sm text-gray-500 uppercase tracking-wide">Agents</h2>
      <div class="card overflow-hidden">
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-gray-500 text-xs uppercase border-b border-gray-200">
            <th class="text-left px-5 py-2">Full Name</th><th class="text-left px-5 py-2">Email</th><th class="text-left px-5 py-2">Phone</th><th class="text-left px-5 py-2">Agent ID</th><th class="text-left px-5 py-2">Status</th>
          </tr></thead>
          <tbody id="agentsBody" class="divide-y divide-gray-100 text-gray-700"></tbody>
        </table></div>
        <div class="px-5 py-2 border-t border-gray-200 text-xs text-gray-500" id="agentCount"></div>
      </div>
    </div>

  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

const token = localStorage.getItem('token');
const role  = localStorage.getItem('role');
const name  = localStorage.getItem('name');

if (!token || !['unit_manager','sales_manager','team_leader'].includes(role)) {
  window.location.href = 'index.html';
}

const ROLE_LABELS = { unit_manager: 'Unit Manager', sales_manager: 'Sales Manager', team_leader: 'Team Leader' };

document.getElementById('sidebarRoleLabel').textContent = 'TPPG ' + (ROLE_LABELS[role] || '');
document.getElementById('sidebarName').textContent = name || '—';
document.getElementById('sidebarRole2').textContent = ROLE_LABELS[role] || '—';
document.getElementById('sidebarInitials').textContent = (name || '?')[0].toUpperCase();
document.getElementById('pageTitle').textContent = `${ROLE_LABELS[role]} Dashboard`;

const SB = { approved:'badge-green', pending:'badge-yellow', rejected:'badge-red', suspended:'badge-red' };

async function loadMyTeam(){
  try {
    const res = await fetch('/api/my-team', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) throw new Error('Failed to load team');
    const data = await res.json();

    // Sales Managers (Unit Manager only)
    if (data.salesManagers && data.salesManagers.length){
      document.getElementById('smSection').classList.remove('hidden');
      document.getElementById('smGrid').innerHTML = data.salesManagers.map(sm => `
        <div class="card p-4">
          <div class="w-9 h-9 rounded-full bg-orange-500/15 text-orange-500 flex items-center justify-center font-bold mb-2">${sm.name[0]}</div>
          <p class="font-semibold text-sm">${sm.name}</p>
          <p class="text-xs text-gray-500">${sm.email||'—'}</p>
        </div>
      `).join('');
    }

    // Team Leaders (Unit Manager + Sales Manager)
    if (data.teamLeaders && data.teamLeaders.length){
      document.getElementById('tlSection').classList.remove('hidden');
      document.getElementById('tlGrid').innerHTML = data.teamLeaders.map(tl => `
        <div class="card p-4">
          <div class="w-9 h-9 rounded-full bg-orange-500/15 text-orange-500 flex items-center justify-center font-bold mb-2">${tl.name[0]}</div>
          <p class="font-semibold text-sm">${tl.name}</p>
          <p class="text-xs text-gray-500">${tl.email||'—'}</p>
        </div>
      `).join('');
    }

    // Agents (everyone)
    const agents = data.agents || [];
    document.getElementById('agentsBody').innerHTML = agents.map(a => `
      <tr>
        <td class="px-5 py-3 font-medium text-xs">${a.name}</td>
        <td class="px-5 py-3 text-gray-500 text-xs">${a.email}</td>
        <td class="px-5 py-3 text-gray-500 text-xs">${a.phone||'—'}</td>
        <td class="px-5 py-3 font-mono text-xs">${a.agent_id||'—'}</td>
        <td class="px-5 py-3 text-xs"><span class="badge ${SB[a.status]||'badge-blue'}">${a.status}</span></td>
      </tr>
    `).join('') || `<tr><td colspan="5" class="px-5 py-5 text-center text-gray-500 text-xs">No agents in your team yet.</td></tr>`;

    document.getElementById('agentCount').textContent = `${agents.length} agent${agents.length===1?'':'s'} on your team`;

    const smCount = (data.salesManagers||[]).length;
    const tlCount = (data.teamLeaders||[]).length;
    document.getElementById('teamSummary').textContent =
      role==='unit_manager' ? `${smCount} Sales Managers · ${tlCount} Team Leaders · ${agents.length} Agents` :
      role==='sales_manager' ? `${tlCount} Team Leaders · ${agents.length} Agents` :
      `${agents.length} Agents`;

  } catch(err) {
    console.error('Error loading team:', err);
  }
}

window.logout = () => {
  localStorage.clear();
  window.location.href = 'index.html';
};

loadMyTeam();

});
</script>
</body>
</html>
